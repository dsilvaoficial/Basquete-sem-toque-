<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Basket Motion Lite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.9) contrast(1.1);
  opacity: 0.5;
}

canvas {
  position: absolute;
}

#debug {
  position: absolute;
  top: 20px;
  left: 20px;
  color: yellow;
}
</style>
</head>
<body>

<div id="debug">Iniciando...</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const debug = document.getElementById("debug");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- BOLA ----------------
let ball = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  vx: 0,
  vy: 0,
  active: false
};

const hoop = {
  x: canvas.width / 2 - 50,
  y: 120,
  width: 100,
  height: 10
};

const gravity = 0.5;
let lastY = null;

// ---------------- ARREMESSO ----------------
function shoot() {
  if (!ball.active) {
    ball.active = true;
    ball.vy = -12;
    ball.vx = 0;
  }
}

// ---------------- MEDIAPIPE ----------------
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.4,
  minTrackingConfidence: 0.4
});

hands.onResults(results => {

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    debug.innerText = "SEM MÃO ❌";
    lastY = null;
    return;
  }

  const hand = results.multiHandLandmarks[0];
  const y = hand[9].y * canvas.height;

  debug.innerText = "MÃO DETECTADA ✔️";

  // gesto simples (subiu a mão)
  if (lastY !== null) {
    if (y < lastY - 20) {
      shoot();
    }
  }

  lastY = y;
});

// ---------------- CAMERA ----------------
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 320,
  height: 240
});

camera.start();

// ---------------- LOOP ----------------
function loop() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // bola
  if (ball.active) {
    ball.vy += gravity;
    ball.y += ball.vy;

    // cesta
    if (
      ball.x > hoop.x &&
      ball.x < hoop.x + hoop.width &&
      ball.y < hoop.y + hoop.height &&
      ball.y > hoop.y &&
      ball.vy > 0
    ) {
      ball.active = false;
      ball.y = canvas.height - 100;
    }

    // caiu
    if (ball.y > canvas.height) {
      ball.active = false;
      ball.y = canvas.height - 100;
    }
  }

  // desenhar bola
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 20, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();

  // desenhar cesta
  ctx.fillStyle = "red";
  ctx.fillRect(hoop.x, hoop.y, hoop.width, hoop.height);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
