<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Basket Motion Lite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;

  /* 🔥 AJUSTE DE LUZ (menos estourado) */
  filter: brightness(0.9) contrast(1.1);
  opacity: 0.5;
}

canvas {
  position: absolute;
}

#debug {
  position: absolute;
  top: 20px;
  left: 20px;
  color: yellow;
  font-size: 16px;
}

#btn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px;
  background: orange;
  border: none;
  border-radius: 10px;
}
</style>
</head>
<body>

<div id="debug">Iniciando...</div>
<button id="btn">ARREMESSAR</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const debug = document.getElementById("debug");
const btn = document.getElementById("btn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- BOLA ----------------
let ball = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  vx: 0,
  vy: 0,
  active: false
};

const gravity = 0.5;
let handY = null;

// ---------------- ARREMESSO ----------------
function shoot() {
  if (!ball.active) {
    ball.active = true;
    ball.vy = -12;
    ball.vx = 0;
  }
}

btn.onclick = shoot;

// ---------------- MEDIAPIPE ----------------
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,

  /* 🔥 MAIS LEVE PRO SEU CELULAR */
  modelComplexity: 0,

  minDetectionConfidence: 0.4,
  minTrackingConfidence: 0.4
});

hands.onResults(results => {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    debug.innerText = "SEM MÃO ❌";
    handY = null;
    return;
  }

  const hand = results.multiHandLandmarks[0];
  const y = hand[9].y * canvas.height;

  debug.innerText = "MÃO DETECTADA ✔️";

  // desenha poucos pontos (leve)
  for (let i = 0; i < hand.length; i += 4) {
    let px = hand[i].x * canvas.width;
    let py = hand[i].y * canvas.height;

    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = "lime";
    ctx.fill();
  }

  // 👉 gesto simples (subiu a mão)
  if (handY !== null) {
    if (y < handY - 20) {
      shoot();
    }
  }

  handY = y;
});

// ---------------- CAMERA ----------------
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 320,   // 🔥 mais leve
  height: 240
});

camera.start();

// ---------------- LOOP ----------------
function loop() {

  if (ball.active) {
    ball.vy += gravity;
    ball.y += ball.vy;

    if (ball.y > canvas.height) {
      ball.active = false;
      ball.y = canvas.height - 100;
    }
  }

  // desenhar bola
  ctx.beginPath();
  ctx.arc(canvas.width / 2, ball.y, 20, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
