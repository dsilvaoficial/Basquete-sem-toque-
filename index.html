<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Basket Motion Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.25;
}

canvas {
  position: absolute;
}

#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 22px;
}
</style>
</head>
<body>

<div id="score">Pontos: 0</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ------------------ ESTADO ------------------
let score = 0;

let ball = {
  x: canvas.width / 2,
  y: canvas.height - 120,
  vx: 0,
  vy: 0,
  radius: 18,
  active: false
};

const hoop = {
  x: canvas.width / 2 - 60,
  y: 140,
  width: 120,
  height: 12
};

const gravity = 0.5;

// ------------------ GESTO ------------------
let lastY = null;
let smoothedVelocity = 0;
let handX = canvas.width / 2;
let gestureCooldown = 0;

// ------------------ MEDIAPIPE ------------------
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults(results => {

  // se perder a mão, evita bug
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    lastY = null;
    smoothedVelocity = 0;
    return;
  }

  const hand = results.multiHandLandmarks[0];

  const x = hand[9].x * canvas.width;
  const y = hand[9].y * canvas.height;

  handX = x;

  if (lastY !== null) {

    let velocity = lastY - y;

    // suavização melhor
    smoothedVelocity = smoothedVelocity * 0.6 + velocity * 0.4;

    console.log("Vel:", smoothedVelocity);

    // evita spam de arremesso
    if (gestureCooldown <= 0) {

      if (smoothedVelocity > 4 && smoothedVelocity < 40 && !ball.active) {

        alert("DISPAROU");

        ball.active = true;

        let direction = (handX - canvas.width / 2) / 40;

        ball.vx = direction;
        ball.vy = -Math.min(20, smoothedVelocity * 2);

        gestureCooldown = 15; // trava por alguns frames
      }
    }
  }

  lastY = y;
});

// ------------------ CAMERA ------------------
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});
camera.start();

// ------------------ UPDATE ------------------
function update() {

  if (gestureCooldown > 0) gestureCooldown--;

  if (ball.active) {
    ball.vy += gravity;
    ball.x += ball.vx;
    ball.y += ball.vy;

    // DETECÇÃO DE CESTA MELHOR
    if (
      ball.x > hoop.x &&
      ball.x < hoop.x + hoop.width &&
      ball.y > hoop.y &&
      ball.y < hoop.y + hoop.height &&
      ball.vy > 0
    ) {
      score++;
      scoreEl.innerText = "Pontos: " + score;

      ball.active = false;
      resetBall();
    }

    // caiu
    if (ball.y > canvas.height) {
      ball.active = false;
      resetBall();
    }
  }
}

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height - 120;
  ball.vx = 0;
  ball.vy = 0;
}

// ------------------ DRAW ------------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // sombra
  ctx.beginPath();
  ctx.arc(ball.x, canvas.height - 40, ball.radius * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fill();

  // bola
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();

  // aro
  ctx.fillStyle = "red";
  ctx.fillRect(hoop.x, hoop.y, hoop.width, hoop.height);

  // mira
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, canvas.height);
  ctx.lineTo(handX, 0);
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.stroke();
}

// ------------------ LOOP ------------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
  
loop();
</script>

</body>
</html>
