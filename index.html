<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Basket Motion FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.4;
  filter: brightness(1.5) contrast(1.2);
}

canvas {
  position: absolute;
}

#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 22px;
}

#debug {
  position: absolute;
  top: 50px;
  left: 20px;
  color: yellow;
}

#shootBtn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  background: orange;
  border-radius: 10px;
}
</style>
</head>
<body>

<div id="score">Pontos: 0</div>
<div id="debug">Iniciando...</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<button id="shootBtn">ARREMESSAR</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const debug = document.getElementById("debug");
const shootBtn = document.getElementById("shootBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- ESTADO ----------------
let score = 0;

let ball = {
  x: canvas.width / 2,
  y: canvas.height - 120,
  vx: 0,
  vy: 0,
  radius: 18,
  active: false
};

const hoop = {
  x: canvas.width / 2 - 60,
  y: 140,
  width: 120,
  height: 12
};

const gravity = 0.5;

let handX = canvas.width / 2;

// ---------------- FUNÇÃO DE ARREMESSO ----------------
function shoot() {
  if (!ball.active) {
    ball.active = true;

    let direction = (handX - canvas.width / 2) / 50;

    ball.vx = direction;
    ball.vy = -14;

    debug.innerText = "ARREMESSO ✔️";
  }
}

// botão fallback
shootBtn.onclick = shoot;

// ---------------- CÂMERA (fallback direto) ----------------
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
  debug.innerText = "Câmera OK";

  startMediaPipe();
})
.catch(err => {
  debug.innerText = "Erro câmera ❌";
  alert(err);
});

// ---------------- MEDIAPIPE ----------------
function startMediaPipe() {

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  hands.onResults(results => {

    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
      debug.innerText = "SEM MÃO";
      return;
    }

    const hand = results.multiHandLandmarks[0];

    const x = hand[9].x * canvas.width;
    const y = hand[9].y * canvas.height;

    handX = x;

    debug.innerText = "MÃO ✔️ X: " + Math.floor(x);

    // 👉 disparo simples (funciona sempre)
    if (y < canvas.height * 0.4) {
      shoot();
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });

  camera.start();
}

// ---------------- UPDATE ----------------
function update() {
  if (ball.active) {
    ball.vy += gravity;
    ball.x += ball.vx;
    ball.y += ball.vy;

    if (
      ball.x > hoop.x &&
      ball.x < hoop.x + hoop.width &&
      ball.y > hoop.y &&
      ball.y < hoop.y + hoop.height &&
      ball.vy > 0
    ) {
      score++;
      scoreEl.innerText = "Pontos: " + score;
      ball.active = false;
      resetBall();
    }

    if (ball.y > canvas.height) {
      ball.active = false;
      resetBall();
    }
  }
}

function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height - 120;
  ball.vx = 0;
  ball.vy = 0;
}

// ---------------- DRAW ----------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(ball.x, canvas.height - 40, ball.radius * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();

  ctx.fillStyle = "red";
  ctx.fillRect(hoop.x, hoop.y, hoop.width, hoop.height);

  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, canvas.height);
  ctx.lineTo(handX, 0);
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.stroke();
}

// ---------------- LOOP ----------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
